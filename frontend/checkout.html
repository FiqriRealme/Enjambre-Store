<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout - Enjambre</title>
    <link rel="stylesheet" href="checkout-style.css">
</head>
<body>
    <header>
        <h2 class="logo" onclick="location.href='index.html'">Enjambre</h2>
    </header>

    <main class="checkout-container">
        <div class="summary-section">
            <h1>Review Order</h1>
            <div id="checkout-list">
                </div>
        </div>

        <div class="payment-section">
            <div class="payment-card">
                <h3>Payment Method</h3>
                <div class="method-options">
                    <label class="option active"><input type="radio" checked> Credit Card / E-Wallet</label>
                </div>
                
                <div class="price-summary">
                    <div class="row"><span>Price</span> <span id="total-price">Rp 0</span></div>
                    <div class="row"><span>Taxes</span> <span>Calculated at Checkout</span></div>
                    <hr>
                    <div class="row total"><span>Total</span> <span id="grand-total">Rp 0</span></div>
                </div>

                <button onclick="confirmPayment()" class="btn-confirm">PLACE ORDER</button>
            </div>
        </div>
    </main>

    <script src="checkout-logic.js"></script>
</body>
</html>
