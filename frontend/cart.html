<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cart - Enjambre</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="cart-style.css">
</head>
<body>
    <header>
        <div class="nav-left">
            <div class="brand-block" onclick="location.href='index.html'">
                <h2 class="logo">Enjambre</h2>
                <p class="brand-subtitle">Secure checkout for your collection</p>
            </div>
        </div>
        <div class="nav-right">
            <button class="nav-link-btn" onclick="location.href='index.html'">
                <i class="fas fa-store"></i>
                <span>Store</span>
            </button>
            <div class="nav-item user-profile">
                <img id="cart-user-avatar" src="https://i.pravatar.cc/150?u=bex" class="avatar" alt="User Avatar">
                <div class="user-meta">
                    <span id="cart-user-name" class="user-name">Player One</span>
                    <span id="cart-user-email" class="user-email">Signed in player</span>
                </div>
            </div>
        </div>
    </header>

    <main class="cart-container">
        <div class="page-heading">
            <div>
                <p class="eyebrow">Checkout</p>
                <h1 class="page-title">My Cart</h1>
            </div>
            <div class="cart-status-pill">
                <i class="fas fa-shield-alt"></i>
                <span>Your account and items are ready to review</span>
            </div>
        </div>
        
        <div class="cart-layout">
            <section class="cart-items" id="cart-items-list">
                </section>

            <aside class="cart-summary">
                <h3>Games and Apps Summary</h3>
                <div class="summary-details">
                    <div class="summary-row">
                        <span>Price</span>
                        <span id="subtotal-price">Rp 0</span>
                    </div>
                    <div class="summary-row">
                        <span>Taxes</span>
                        <span>Calculated at Checkout</span>
                    </div>
                    <hr>
                    <div class="summary-row total">
                        <span>Subtotal</span>
                        <span id="total-price-final">Rp 0</span>
                    </div>
                </div>
                <button class="btn-checkout" onclick="processCheckout()">CHECKOUT</button>
            </aside>
        </div>
    </main>

    <script src="cart-logic.js"></script>
</body>
</html>
